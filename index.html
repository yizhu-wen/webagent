<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Login</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 252, 246, 0.88);
      --panel-border: rgba(59, 38, 21, 0.1);
      --text: #2e241c;
      --muted: #776659;
      --accent: #b55d33;
      --accent-strong: #8f4420;
      --error: #b42318;
      --success: #1f7a45;
      --shadow: 0 24px 80px rgba(55, 34, 18, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #efe5d8 0%, #f9f6f0 45%, #e8ddd1 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(640px, 100%);
      background: rgba(255, 248, 240, 0.8);
      border: 1px solid rgba(88, 61, 34, 0.1);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .shell.expanded {
      width: min(920px, 100%);
    }

    .panel {
      padding: 48px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.9rem;
      letter-spacing: -0.03em;
    }

    .subtext {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid rgba(46, 36, 28, 0.14);
      border-radius: 16px;
      padding: 15px 16px;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.88);
      outline: none;
      transition: border-color 150ms ease, transform 150ms ease, box-shadow 150ms ease;
    }

    input:focus {
      border-color: rgba(181, 93, 51, 0.7);
      box-shadow: 0 0 0 4px rgba(181, 93, 51, 0.12);
      transform: translateY(-1px);
    }

    .password-row {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      cursor: pointer;
      padding: 6px 8px;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .captcha-code {
      border: 1px dashed rgba(46, 36, 28, 0.3);
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(255, 255, 255, 0.75);
      text-align: center;
      user-select: none;
    }

    .captcha-refresh {
      border: 1px solid rgba(46, 36, 28, 0.2);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
    }

    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .remember input {
      width: auto;
      margin: 0;
      accent-color: var(--accent);
    }

    .link {
      color: var(--accent-strong);
      text-decoration: none;
      font-weight: 600;
    }

    .button {
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #fff8f2;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 16px 32px rgba(181, 93, 51, 0.28);
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .status {
      min-height: 24px;
      margin-top: 4px;
      font-size: 0.94rem;
      font-weight: 600;
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--success);
    }

    .signup {
      margin-top: 26px;
      color: var(--muted);
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    .logged-in-view {
      text-align: center;
      padding: 24px 12px 8px;
    }

    .logged-in-view.expanded {
      max-width: 100%;
    }

    .checkmark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #5d9a69 0%, #3b7d4b 100%);
      box-shadow: 0 14px 28px rgba(59, 125, 75, 0.28);
    }

    .logged-in-view h3 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
    }

    .logged-in-view p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .file-prompt {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .prompt-button {
      border: 1px solid rgba(46, 36, 28, 0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
    }

    .audio-player {
      width: 100%;
      margin-top: 14px;
    }

    .spectrogram-panel {
      margin-top: 18px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(46, 36, 28, 0.1);
      text-align: left;
    }

    .spectrogram-panel h4 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--text);
    }

    .spectrogram-panel p {
      margin: 0 0 12px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .spectrogram-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
    }

    .spectrogram-canvas {
      display: block;
      width: 100%;
      max-width: 820px;
      height: auto;
      margin: 0 auto;
      background: linear-gradient(180deg, #0d1117 0%, #111927 100%);
      border: 1px solid rgba(46, 36, 28, 0.12);
    }

    .captcha-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34, 26, 20, 0.35);
      display: grid;
      place-items: center;
      padding: 20px;
      z-index: 1000;
    }

    .captcha-modal {
      width: min(420px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(46, 36, 28, 0.15);
      background: #fffaf3;
      box-shadow: 0 24px 60px rgba(46, 36, 28, 0.25);
      padding: 20px;
    }

    .captcha-modal h4 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .captcha-modal p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .captcha-modal-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 820px) {
      .panel {
        padding: 32px 24px;
      }

      .spectrogram-canvas {
        max-width: 100%;
      }
    }
  </style>
</head>
  <body>
  <main class="shell">
    <section class="panel">
      <div id="loginView">
        <div>
          <h2>Log In</h2>
          <p class="subtext">Enter your account name and password.</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="account">Account</label>
            <input id="account" name="account" type="text" placeholder="Enter your account" autocomplete="username">
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="password-row">
              <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password">
              <button class="toggle" type="button" id="togglePassword" aria-label="Show password">Show</button>
            </div>
          </div>

          <div class="options">
            <label class="remember" for="remember">
              <input id="remember" type="checkbox">
              <span>Remember me</span>
            </label>
            <a class="link" href="#">Forgot password?</a>
          </div>

          <button class="button" type="submit">Sign In</button>
          <div class="status" id="statusMessage" aria-live="polite"></div>
        </form>

        <p class="signup">No account yet? <a class="link" href="#">Create one</a></p>
      </div>

      <div id="loggedInView" class="logged-in-view hidden" aria-live="polite">
        <div class="checkmark">✓</div>
        <h3>You have logged in successfully.</h3>
        <p id="welcomeMessage">Welcome, admin.</p>
        <p id="micStatus">Requesting microphone access...</p>
        <p id="fileStatus"></p>
        <div id="filePrompt" class="file-prompt hidden">
          <button id="acceptFileBtn" class="prompt-button" type="button">Accept and play</button>
          <button id="declineFileBtn" class="prompt-button" type="button">Decline</button>
        </div>
        <audio id="receivedAudio" class="audio-player hidden" controls></audio>
        <div id="spectrogramPanel" class="spectrogram-panel hidden">
          <h4>Recorded Spectrogram</h4>
          <p id="spectrogramStatus">Generating spectrogram...</p>
          <div class="spectrogram-scroll">
            <canvas id="spectrogramCanvas" class="spectrogram-canvas" width="820" height="260"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="captchaModalOverlay" class="captcha-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="captchaModalTitle">
    <div class="captcha-modal">
      <h4 id="captchaModalTitle">CAPTCHA Check</h4>
      <p>Please solve this CAPTCHA before we verify your login.</p>
      <div class="captcha-row">
        <div id="captchaCode" class="captcha-code"></div>
        <button id="refreshCaptchaBtn" class="captcha-refresh" type="button">Refresh</button>
      </div>
      <div class="field" style="margin-top: 12px;">
        <label for="captchaInput">Answer</label>
        <input id="captchaInput" type="text" placeholder="Enter CAPTCHA answer" autocomplete="off">
      </div>
      <div id="captchaModalStatus" class="status" aria-live="polite"></div>
      <div class="captcha-modal-actions">
        <button id="cancelCaptchaBtn" class="prompt-button" type="button">Cancel</button>
        <button id="confirmCaptchaBtn" class="button" type="button">Verify CAPTCHA</button>
      </div>
    </div>
  </div>

  <script>
    const shell = document.querySelector(".shell");
    const form = document.getElementById("loginForm");
    const loginView = document.getElementById("loginView");
    const loggedInView = document.getElementById("loggedInView");
    const accountInput = document.getElementById("account");
    const passwordInput = document.getElementById("password");
    const statusMessage = document.getElementById("statusMessage");
    const togglePassword = document.getElementById("togglePassword");
    const captchaModalOverlay = document.getElementById("captchaModalOverlay");
    const captchaCode = document.getElementById("captchaCode");
    const captchaInput = document.getElementById("captchaInput");
    const refreshCaptchaBtn = document.getElementById("refreshCaptchaBtn");
    const captchaModalStatus = document.getElementById("captchaModalStatus");
    const confirmCaptchaBtn = document.getElementById("confirmCaptchaBtn");
    const cancelCaptchaBtn = document.getElementById("cancelCaptchaBtn");
    const micStatus = document.getElementById("micStatus");
    const fileStatus = document.getElementById("fileStatus");
    const filePrompt = document.getElementById("filePrompt");
    const acceptFileBtn = document.getElementById("acceptFileBtn");
    const declineFileBtn = document.getElementById("declineFileBtn");
    const receivedAudio = document.getElementById("receivedAudio");
    const spectrogramPanel = document.getElementById("spectrogramPanel");
    const spectrogramStatus = document.getElementById("spectrogramStatus");
    const spectrogramCanvas = document.getElementById("spectrogramCanvas");
    const validAccount = "admin";
    const validPassword = "webagent123";
    const targetWavSampleRate = 48000;
    let micStream = null;
    let pendingFileUrl = "";
    let pendingFileName = "";
    let captchaAnswer = "";
    let pendingAccount = "";
    let pendingPassword = "";
    let audioContext = null;
    let recordingSourceNode = null;
    let recordingProcessorNode = null;
    let recordingBufferChunks = [];
    let recordingChannelCount = 0;
    let recordedFrameCount = 0;
    let recordingSessionActive = false;

    const appConfig = {
      captchaEnabled: false,
      downloadFileName: "triangle_fmcw_20-24kHz_7ms_48kHz_10s.wav",
      uploadApiUrl: "/api/upload-recording"
    };

    function buildStaticFileUrl(fileName) {
      return new URL(fileName, window.location.href).href;
    }

    function getMicrophoneConstraints() {
      return {
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          channelCount: { ideal: 2 },
          sampleRate: { ideal: targetWavSampleRate },
          sampleSize: { ideal: 24 }
        },
        video: false
      };
    }

    function buildMicrophoneOnlyStream(sourceStream) {
      const microphoneTracks = sourceStream
        .getAudioTracks()
        .filter((track) => track.readyState === "live" && track.enabled);

      if (!microphoneTracks.length) {
        throw new Error("No live microphone track");
      }

      return new MediaStream(microphoneTracks);
    }

    function buildRecordingTimestamp() {
      const now = new Date();
      return [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join("") + "_" + [
        String(now.getHours()).padStart(2, "0"),
        String(now.getMinutes()).padStart(2, "0"),
        String(now.getSeconds()).padStart(2, "0")
      ].join("");
    }

    function buildRecordingFileName() {
      return `recording_${buildRecordingTimestamp()}.wav`;
    }

    function buildSpectrogramFileName() {
      return `recording_spectrogram_${buildRecordingTimestamp()}.png`;
    }

    function triggerDownload(downloadUrl, fileName) {
      const downloadLink = document.createElement("a");
      downloadLink.href = downloadUrl;
      downloadLink.download = fileName;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      downloadLink.remove();
    }

    function showSpectrogramStatus(message) {
      spectrogramStatus.textContent = message;
      spectrogramPanel.classList.remove("hidden");
    }

    function clearSpectrogram() {
      const ctx = spectrogramCanvas.getContext("2d");
      ctx.clearRect(0, 0, spectrogramCanvas.width, spectrogramCanvas.height);
      spectrogramPanel.classList.add("hidden");
      spectrogramStatus.textContent = "";
    }

    function toMonoChannel(audioBuffer) {
      const channelCount = audioBuffer.numberOfChannels;
      const length = audioBuffer.length;
      if (channelCount === 1) {
        return audioBuffer.getChannelData(0);
      }

      const mono = new Float32Array(length);
      for (let channelIndex = 0; channelIndex < channelCount; channelIndex += 1) {
        const channelData = audioBuffer.getChannelData(channelIndex);
        for (let sampleIndex = 0; sampleIndex < length; sampleIndex += 1) {
          mono[sampleIndex] += channelData[sampleIndex];
        }
      }

      for (let sampleIndex = 0; sampleIndex < length; sampleIndex += 1) {
        mono[sampleIndex] /= channelCount;
      }

      return mono;
    }

    function clampPcmSample(sample) {
      return Math.max(-1, Math.min(1, sample));
    }

    function getRecordingContext() {
      if (!audioContext) {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextCtor({ sampleRate: targetWavSampleRate });
      }
      return audioContext;
    }

    function resetRecordingBuffers() {
      recordingBufferChunks = [];
      recordingChannelCount = 0;
      recordedFrameCount = 0;
      recordingSessionActive = false;
    }

    function stopRecordingNodes() {
      if (recordingSourceNode) {
        recordingSourceNode.disconnect();
        recordingSourceNode = null;
      }
      if (recordingProcessorNode) {
        recordingProcessorNode.disconnect();
        recordingProcessorNode.onaudioprocess = null;
        recordingProcessorNode = null;
      }
      recordingSessionActive = false;
    }

    function buildAudioBufferFromRecording(context) {
      if (!recordedFrameCount || !recordingChannelCount) {
        return null;
      }

      const audioBuffer = context.createBuffer(
        recordingChannelCount,
        recordedFrameCount,
        context.sampleRate
      );
      const channelData = [];
      let frameOffset = 0;

      for (let channelIndex = 0; channelIndex < recordingChannelCount; channelIndex += 1) {
        channelData.push(audioBuffer.getChannelData(channelIndex));
      }

      for (const chunk of recordingBufferChunks) {
        for (let channelIndex = 0; channelIndex < recordingChannelCount; channelIndex += 1) {
          channelData[channelIndex].set(chunk[channelIndex], frameOffset);
        }
        frameOffset += chunk[0].length;
      }

      return audioBuffer;
    }

    function encodeAudioBufferToWav(audioBuffer) {
      const channelCount = audioBuffer.numberOfChannels;
      const sampleRate = audioBuffer.sampleRate;
      const frameCount = audioBuffer.length;
      const bytesPerSample = 2;
      const blockAlign = channelCount * bytesPerSample;
      const byteRate = sampleRate * blockAlign;
      const dataSize = frameCount * blockAlign;
      const wavBuffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(wavBuffer);
      const channelData = [];
      let offset = 0;

      for (let channelIndex = 0; channelIndex < channelCount; channelIndex += 1) {
        channelData.push(audioBuffer.getChannelData(channelIndex));
      }

      function writeAscii(text) {
        for (let index = 0; index < text.length; index += 1) {
          view.setUint8(offset, text.charCodeAt(index));
          offset += 1;
        }
      }

      writeAscii("RIFF");
      view.setUint32(offset, 36 + dataSize, true);
      offset += 4;
      writeAscii("WAVE");
      writeAscii("fmt ");
      view.setUint32(offset, 16, true);
      offset += 4;
      view.setUint16(offset, 1, true);
      offset += 2;
      view.setUint16(offset, channelCount, true);
      offset += 2;
      view.setUint32(offset, sampleRate, true);
      offset += 4;
      view.setUint32(offset, byteRate, true);
      offset += 4;
      view.setUint16(offset, blockAlign, true);
      offset += 2;
      view.setUint16(offset, bytesPerSample * 8, true);
      offset += 2;
      writeAscii("data");
      view.setUint32(offset, dataSize, true);
      offset += 4;

      for (let frameIndex = 0; frameIndex < frameCount; frameIndex += 1) {
        for (let channelIndex = 0; channelIndex < channelCount; channelIndex += 1) {
          const sample = clampPcmSample(channelData[channelIndex][frameIndex]);
          const pcmValue = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
          view.setInt16(offset, Math.round(pcmValue), true);
          offset += bytesPerSample;
        }
      }

      return new Blob([wavBuffer], { type: "audio/wav" });
    }

    function createHannWindow(size) {
      const windowValues = new Float32Array(size);
      for (let index = 0; index < size; index += 1) {
        windowValues[index] = 0.5 * (1 - Math.cos((2 * Math.PI * index) / (size - 1)));
      }
      return windowValues;
    }

    function getSpectrogramColor(value) {
      const clamped = Math.max(0, Math.min(1, value));
      const red = Math.round(255 * Math.pow(clamped, 0.72));
      const green = Math.round(255 * Math.pow(clamped, 1.55));
      const blue = Math.round(40 + 180 * (1 - clamped) * Math.pow(clamped, 0.35));
      return [red, green, blue];
    }

    function drawSpectrogramAxes(ctx, plotArea, audioBuffer) {
      const duration = audioBuffer.duration;
      const sampleRate = audioBuffer.sampleRate;
      const maxFrequency = sampleRate / 2;
      const frequencyTicks = 5;
      const timeTicks = Math.max(2, Math.min(6, Math.round(duration)));

      ctx.save();
      ctx.strokeStyle = "rgba(255, 248, 240, 0.28)";
      ctx.fillStyle = "rgba(255, 248, 240, 0.92)";
      ctx.lineWidth = 1;
      ctx.font = "12px 'Segoe UI', sans-serif";

      ctx.beginPath();
      ctx.moveTo(plotArea.left, plotArea.top);
      ctx.lineTo(plotArea.left, plotArea.bottom);
      ctx.lineTo(plotArea.right, plotArea.bottom);
      ctx.stroke();

      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let index = 0; index < frequencyTicks; index += 1) {
        const ratio = index / (frequencyTicks - 1);
        const y = plotArea.bottom - ratio * plotArea.height;
        const frequency = (ratio * maxFrequency) / 1000;
        ctx.beginPath();
        ctx.moveTo(plotArea.left - 6, y);
        ctx.lineTo(plotArea.left, y);
        ctx.stroke();
        ctx.fillText(`${frequency.toFixed(frequency >= 10 ? 0 : 1)} kHz`, plotArea.left - 10, y);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (let index = 0; index <= timeTicks; index += 1) {
        const ratio = index / timeTicks;
        const x = plotArea.left + ratio * plotArea.width;
        const seconds = ratio * duration;
        ctx.beginPath();
        ctx.moveTo(x, plotArea.bottom);
        ctx.lineTo(x, plotArea.bottom + 6);
        ctx.stroke();
        ctx.fillText(`${seconds.toFixed(duration >= 10 ? 0 : 1)} s`, x, plotArea.bottom + 10);
      }

      ctx.restore();
    }

    async function renderSpectrogram(recordedBlob) {
      showSpectrogramStatus("Generating spectrogram...");

      try {
        const arrayBuffer = await recordedBlob.arrayBuffer();
        const decodingContext = getRecordingContext();
        const audioBuffer = await decodingContext.decodeAudioData(arrayBuffer.slice(0));
        const samples = toMonoChannel(audioBuffer);
        if (samples.length < 8) {
          throw new Error("Recording too short");
        }
        const canvasWidth = spectrogramCanvas.width;
        const canvasHeight = spectrogramCanvas.height;
        const margin = { top: 16, right: 14, bottom: 54, left: 70 };
        const plotWidth = canvasWidth - margin.left - margin.right;
        const plotHeight = canvasHeight - margin.top - margin.bottom;
        const plotArea = {
          left: margin.left,
          top: margin.top,
          right: margin.left + plotWidth,
          bottom: margin.top + plotHeight,
          width: plotWidth,
          height: plotHeight
        };
        const fftSize = 512;
        const nyquistBins = fftSize / 2;
        const hopSize = Math.max(1, Math.floor(Math.max(1, samples.length - fftSize) / plotWidth));
        const windowValues = createHannWindow(fftSize);
        const ctx = spectrogramCanvas.getContext("2d");
        const imageData = ctx.createImageData(plotWidth, plotHeight);
        const pixelBuffer = imageData.data;

        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        ctx.fillStyle = "#0c0820";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        for (let x = 0; x < plotWidth; x += 1) {
          const start = Math.max(0, Math.min(samples.length - fftSize, x * hopSize));

          for (let y = 0; y < plotHeight; y += 1) {
            const normalizedY = y / Math.max(1, plotHeight - 1);
            const frequencyBin = Math.min(
              nyquistBins - 1,
              Math.floor(Math.pow(normalizedY, 1.85) * (nyquistBins - 1))
            );

            let real = 0;
            let imaginary = 0;
            for (let n = 0; n < fftSize; n += 1) {
              const sample = samples[start + n] * windowValues[n];
              const angle = (2 * Math.PI * frequencyBin * n) / fftSize;
              real += sample * Math.cos(angle);
              imaginary -= sample * Math.sin(angle);
            }

            const magnitude = Math.sqrt(real * real + imaginary * imaginary) / fftSize;
            const db = 20 * Math.log10(magnitude + 1e-6);
            const normalizedMagnitude = Math.max(0, Math.min(1, (db + 90) / 70));
            const [red, green, blue] = getSpectrogramColor(normalizedMagnitude);
            const pixelIndex = ((plotHeight - 1 - y) * plotWidth + x) * 4;
            pixelBuffer[pixelIndex] = red;
            pixelBuffer[pixelIndex + 1] = green;
            pixelBuffer[pixelIndex + 2] = blue;
            pixelBuffer[pixelIndex + 3] = 255;
          }
        }

        ctx.putImageData(imageData, plotArea.left, plotArea.top);
        drawSpectrogramAxes(ctx, plotArea, audioBuffer);
        showSpectrogramStatus("Spectrogram of the recorded audio.");
      } catch (error) {
        showSpectrogramStatus("Could not generate a spectrogram for the recording.");
      }
    }

    async function downloadRecordedAudio() {
      const context = getRecordingContext();
      const recordedAudioBuffer = buildAudioBufferFromRecording(context);

      if (!recordedAudioBuffer) {
        fileStatus.textContent = "Playback finished, but no microphone recording was captured.";
        return;
      }

      try {
        const wavBlob = encodeAudioBufferToWav(recordedAudioBuffer);
        await renderSpectrogram(wavBlob);
        const fileName = buildRecordingFileName();
        const downloadUrl = URL.createObjectURL(wavBlob);
        triggerDownload(downloadUrl, fileName);
        window.setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);

        const spectrogramUrl = spectrogramCanvas.toDataURL("image/png");
        const spectrogramFileName = buildSpectrogramFileName();
        triggerDownload(spectrogramUrl, spectrogramFileName);

        fileStatus.textContent = `Playback finished. Recording downloaded as ${fileName} at ${recordedAudioBuffer.sampleRate} Hz, spectrogram downloaded as ${spectrogramFileName}.`;
      } catch (error) {
        fileStatus.textContent = "Playback finished, but failed to download the recording or spectrogram.";
      } finally {
        resetRecordingBuffers();
      }
    }

    function generateCaptcha() {
      const left = Math.floor(Math.random() * 9) + 1;
      const right = Math.floor(Math.random() * 9) + 1;
      captchaAnswer = String(left + right);
      captchaCode.textContent = `${left} + ${right} = ?`;
      captchaInput.value = "";
    }

    function setCaptchaEnabled(enabled) {
      appConfig.captchaEnabled = Boolean(enabled);
      if (!appConfig.captchaEnabled) {
        captchaModalOverlay.classList.add("hidden");
      }
    }

    function openCaptchaModal(account, password) {
      pendingAccount = account;
      pendingPassword = password;
      captchaModalStatus.textContent = "";
      captchaModalStatus.className = "status";
      generateCaptcha();
      captchaModalOverlay.classList.remove("hidden");
      captchaInput.focus();
    }

    function closeCaptchaModal() {
      captchaModalOverlay.classList.add("hidden");
      captchaInput.value = "";
      pendingAccount = "";
      pendingPassword = "";
    }

    function clearPendingFile() {
      pendingFileUrl = "";
      pendingFileName = "";
      filePrompt.classList.add("hidden");
    }

    async function playPendingAudio() {
      if (!pendingFileUrl) {
        return;
      }

      try {
        fileStatus.textContent = "Loading audio file...";
        const response = await fetch(pendingFileUrl, { method: "GET" });
        if (!response.ok) {
          throw new Error("Audio fetch failed");
        }
        const audioBlob = await response.blob();
        if (!audioBlob.type.startsWith("audio/")) {
          throw new Error("Not an audio file");
        }

        const objectUrl = URL.createObjectURL(audioBlob);
        receivedAudio.src = objectUrl;
        receivedAudio.classList.remove("hidden");
        await startRecordingSession();
        await receivedAudio.play();
        if (!recordingSessionActive) {
          fileStatus.textContent = `Playing audio: ${pendingFileName}`;
        }
        clearPendingFile();
      } catch (error) {
        stopRecordingSession();
        fileStatus.textContent = "Could not play audio file.";
      }
    }

    async function requestFileFromServer() {
      fileStatus.textContent = "Preparing file...";
      clearPendingFile();
      clearSpectrogram();

      try {
        const fileUrl = buildStaticFileUrl(appConfig.downloadFileName);
        const response = await fetch(fileUrl, { method: "HEAD" });
        if (!response.ok) {
          throw new Error("File not found");
        }

        pendingFileUrl = fileUrl;
        pendingFileName = appConfig.downloadFileName;
        fileStatus.textContent = `File ready: ${pendingFileName}. Accept to play?`;
        filePrompt.classList.remove("hidden");
      } catch (error) {
        clearPendingFile();
        fileStatus.textContent = "Failed to find file on this site.";
      }
    }

    async function requestMicrophone() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        micStatus.textContent = "Microphone is not supported in this browser.";
        fileStatus.textContent = "File request skipped.";
        return;
      }

      try {
        micStream = await navigator.mediaDevices.getUserMedia(getMicrophoneConstraints());
        if (micStream) {
          micStatus.textContent = "Microphone is on.";
          await requestFileFromServer();
        }
      } catch (error) {
        micStatus.textContent = "Could not turn on microphone. Please allow microphone permission.";
        fileStatus.textContent = "File request skipped.";
      }
    }

    function stopRecordingSession() {
      const shouldFinalizeRecording = recordingSessionActive || recordedFrameCount > 0;
      stopRecordingNodes();
      if (micStream) {
        micStream.getTracks().forEach((track) => track.stop());
        micStream = null;
      }
      if (shouldFinalizeRecording) {
        downloadRecordedAudio();
      } else {
        resetRecordingBuffers();
      }
    }

    async function startRecordingSession() {
      if (!micStream) {
        return false;
      }
      if (!window.AudioContext && !window.webkitAudioContext) {
        fileStatus.textContent = "Playback started, but raw microphone capture is not supported in this browser.";
        return false;
      }

      try {
        const recordingContext = getRecordingContext();
        if (recordingContext.state === "suspended") {
          await recordingContext.resume();
        }

        const microphoneOnlyStream = buildMicrophoneOnlyStream(micStream);
        const processorChannelCount = Math.max(
          1,
          Math.min(
            2,
            microphoneOnlyStream.getAudioTracks()[0].getSettings().channelCount || 1
          )
        );

        stopRecordingNodes();
        resetRecordingBuffers();

        recordingSourceNode = recordingContext.createMediaStreamSource(microphoneOnlyStream);
        recordingProcessorNode = recordingContext.createScriptProcessor(4096, processorChannelCount, processorChannelCount);
        recordingProcessorNode.onaudioprocess = (event) => {
          const inputBuffer = event.inputBuffer;

          if (!recordingChannelCount) {
            recordingChannelCount = inputBuffer.numberOfChannels;
          }

          const chunk = [];
          for (let channelIndex = 0; channelIndex < recordingChannelCount; channelIndex += 1) {
            chunk.push(new Float32Array(inputBuffer.getChannelData(channelIndex)));
          }
          recordingBufferChunks.push(chunk);
          recordedFrameCount += inputBuffer.length;
        };

        recordingSourceNode.connect(recordingProcessorNode);
        recordingProcessorNode.connect(recordingContext.destination);
        recordingSessionActive = true;

        fileStatus.textContent = "Playing audio while capturing raw microphone PCM only.";
        return true;
      } catch (error) {
        stopRecordingNodes();
        resetRecordingBuffers();
        fileStatus.textContent = "Audio is playing, but raw microphone capture could not start.";
        return false;
      }
    }

    async function verifyCredentialsAndContinue(account, password) {
      if (account !== validAccount || password !== validPassword) {
        statusMessage.textContent = "Wrong account or password.";
        statusMessage.classList.add("error");
        return;
      }

      shell.classList.add("expanded");
      loginView.classList.add("hidden");
      loggedInView.classList.add("expanded");
      loggedInView.classList.remove("hidden");
      await requestMicrophone();
    }

    togglePassword.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      togglePassword.textContent = isHidden ? "Hide" : "Show";
      togglePassword.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    });

    refreshCaptchaBtn.addEventListener("click", () => {
      generateCaptcha();
    });

    confirmCaptchaBtn.addEventListener("click", async () => {
      captchaModalStatus.className = "status";
      if (captchaInput.value.trim() !== captchaAnswer) {
        captchaModalStatus.textContent = "Wrong CAPTCHA.";
        captchaModalStatus.classList.add("error");
        generateCaptcha();
        return;
      }

      const accountToVerify = pendingAccount;
      const passwordToVerify = pendingPassword;
      closeCaptchaModal();
      await verifyCredentialsAndContinue(accountToVerify, passwordToVerify);
    });

    cancelCaptchaBtn.addEventListener("click", () => {
      closeCaptchaModal();
      statusMessage.textContent = "CAPTCHA cancelled.";
      statusMessage.classList.add("error");
    });

    acceptFileBtn.addEventListener("click", async () => {
      await playPendingAudio();
    });

    declineFileBtn.addEventListener("click", () => {
      fileStatus.textContent = "File declined.";
      clearPendingFile();
    });

    receivedAudio.addEventListener("ended", () => {
      stopRecordingSession();
    });

    receivedAudio.addEventListener("error", () => {
      stopRecordingSession();
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const account = accountInput.value.trim();
      const password = passwordInput.value.trim();

      statusMessage.className = "status";

      if (!account || !password) {
        statusMessage.textContent = "Please enter both account and password.";
        statusMessage.classList.add("error");
        return;
      }

      if (appConfig.captchaEnabled) {
        openCaptchaModal(account, password);
        return;
      }

      await verifyCredentialsAndContinue(account, password);
    });

    // Change this to false if you want login without CAPTCHA.
    setCaptchaEnabled(appConfig.captchaEnabled);
    // You can toggle at runtime from browser console: window.setCaptchaEnabled(false)
    window.setCaptchaEnabled = setCaptchaEnabled;
  </script>
</body>
</html>
