<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Agent Audio Capture</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 252, 246, 0.88);
      --panel-border: rgba(59, 38, 21, 0.1);
      --text: #2e241c;
      --muted: #776659;
      --shadow: 0 24px 80px rgba(55, 34, 18, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #efe5d8 0%, #f9f6f0 45%, #e8ddd1 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(640px, 100%);
      background: rgba(255, 248, 240, 0.8);
      border: 1px solid rgba(88, 61, 34, 0.1);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .shell.expanded {
      width: min(920px, 100%);
    }

    .panel {
      padding: 48px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }

    .app-view {
      text-align: center;
      padding: 24px 12px 8px;
    }

    .app-view.expanded {
      max-width: 100%;
    }

    .checkmark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #5d9a69 0%, #3b7d4b 100%);
      box-shadow: 0 14px 28px rgba(59, 125, 75, 0.28);
    }

    .app-view h3 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
    }

    .app-view p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .file-prompt {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .prompt-button {
      border: 1px solid rgba(46, 36, 28, 0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
    }

    .event-log-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .event-log-button {
      background: #2e241c;
      color: #ffffff;
    }

    .experiment-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .prompt-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .audio-player {
      width: 100%;
      margin-top: 14px;
    }

    .spectrogram-panel {
      margin-top: 18px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(46, 36, 28, 0.1);
      text-align: left;
    }

    .spectrogram-panel h4 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--text);
    }

    .spectrogram-panel p {
      margin: 0 0 12px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .spectrogram-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
    }

    .spectrogram-canvas {
      display: block;
      width: 100%;
      max-width: 820px;
      height: auto;
      margin: 0 auto;
      background: linear-gradient(180deg, #0d1117 0%, #111927 100%);
      border: 1px solid rgba(46, 36, 28, 0.12);
    }

    @media (max-width: 820px) {
      .panel {
        padding: 32px 24px;
      }

      .spectrogram-canvas {
        max-width: 100%;
      }
    }
  </style>
</head>
  <body>
  <main class="shell expanded">
    <section class="panel">
      <div id="appView" class="app-view expanded" aria-live="polite">
        <div class="checkmark">✓</div>
        <h3>Audio capture ready.</h3>
        <p id="welcomeMessage">Start sensing to loop the ultrasound chirp while capturing microphone audio.</p>
        <p id="micStatus">Requesting microphone access...</p>
        <p id="fileStatus"></p>
        <div id="filePrompt" class="file-prompt hidden">
          <button id="startSensingBtn" class="prompt-button" type="button">Start sensing</button>
          <button id="stopSensingBtn" class="prompt-button" type="button" disabled>Stop</button>
        </div>
        <div class="event-log-actions">
          <a class="prompt-button experiment-link" href="experiments/">Open shopping experiment</a>
          <a class="prompt-button experiment-link" href="experiments/travel/">Open travel experiment</a>
        </div>
        <audio id="receivedAudio" class="audio-player hidden" loop></audio>
        <div id="spectrogramPanel" class="spectrogram-panel hidden">
          <h4>Recorded Spectrogram</h4>
          <p id="spectrogramStatus">Generating spectrogram...</p>
          <div class="spectrogram-scroll">
            <canvas id="spectrogramCanvas" class="spectrogram-canvas" width="820" height="260"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const micStatus = document.getElementById("micStatus");
    const fileStatus = document.getElementById("fileStatus");
    const filePrompt = document.getElementById("filePrompt");
    const startSensingBtn = document.getElementById("startSensingBtn");
    const stopSensingBtn = document.getElementById("stopSensingBtn");
    const receivedAudio = document.getElementById("receivedAudio");
    const spectrogramPanel = document.getElementById("spectrogramPanel");
    const spectrogramStatus = document.getElementById("spectrogramStatus");
    const spectrogramCanvas = document.getElementById("spectrogramCanvas");
    const targetWavSampleRate = 48000;
    let micStream = null;
    let pendingFileUrl = "";
    let pendingFileName = "";
    let receivedAudioObjectUrl = "";
    let audioContext = null;
    let recordingSourceNode = null;
    let recordingProcessorNode = null;
    let recordingBufferChunks = [];
    let recordingChannelCount = 0;
    let recordedFrameCount = 0;
    let recordingSessionActive = false;
    let playbackStartInProgress = false;
    let sensingSessionActive = false;

    const appConfig = {
      downloadFileName: "triangle_fmcw_20-24kHz_7ms_48kHz_10s.wav",
      uploadApiUrl: "/api/upload-recording"
    };

    const trackingConfig = {
      maxEvents: 10000,
      mousemoveThrottleMs: 250,
      scrollThrottleMs: 250
    };
    const trackingSessionId = createTrackingId();
    let trackingStartedAt = null;
    const eventLog = [];
    let lastMousemoveTrackAt = 0;
    let lastScrollTrackAt = 0;
    let interactionTrackingEnabled = false;

    function createTrackingId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `event_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function getElementDescriptor(element) {
      if (!(element instanceof Element)) {
        return null;
      }

      const descriptor = {
        tag: element.tagName.toLowerCase()
      };

      if (element.id) {
        descriptor.id = element.id;
      }
      if (element.classList.length) {
        descriptor.classes = Array.from(element.classList).slice(0, 5);
      }
      if (element.getAttribute("name")) {
        descriptor.name = element.getAttribute("name");
      }
      if (element.getAttribute("type")) {
        descriptor.type = element.getAttribute("type");
      }
      if (element.getAttribute("role")) {
        descriptor.role = element.getAttribute("role");
      }
      if (element.getAttribute("aria-label")) {
        descriptor.ariaLabel = element.getAttribute("aria-label");
      }
      if (element.matches("button, a, input[type='button'], input[type='submit']")) {
        const visibleLabel = (element.innerText || element.value || "").trim();
        if (visibleLabel) {
          descriptor.label = visibleLabel.slice(0, 80);
        }
      }

      return descriptor;
    }

    function getSafeKey(event) {
      if (event.key && event.key.length > 1) {
        return event.key;
      }
      return "character";
    }

    function getSafeUrlPath(url) {
      if (!url) {
        return "";
      }

      try {
        return new URL(url, window.location.href).pathname;
      } catch (error) {
        return "";
      }
    }

    function trackEvent(name, properties = {}, options = {}) {
      if (!interactionTrackingEnabled && !options.force) {
        return;
      }

      if (eventLog.length >= trackingConfig.maxEvents) {
        eventLog.shift();
      }

      eventLog.push({
        id: createTrackingId(),
        sessionId: trackingSessionId,
        name,
        timestamp: new Date().toISOString(),
        page: {
          path: window.location.pathname,
          title: document.title,
          visibilityState: document.visibilityState
        },
        viewport: {
          width: window.innerWidth,
          height: window.innerHeight
        },
        properties
      });
    }

    function setInteractionTrackingEnabled(enabled) {
      if (interactionTrackingEnabled === enabled) {
        return;
      }

      interactionTrackingEnabled = enabled;
      if (enabled) {
        trackingStartedAt = trackingStartedAt || new Date().toISOString();
        trackEvent("page_view", {
          path: window.location.pathname,
          referrerPath: getSafeUrlPath(document.referrer)
        }, { force: true });
      }
    }

    function beginInteractionTrackingSession() {
      eventLog.length = 0;
      trackingStartedAt = new Date().toISOString();
      lastMousemoveTrackAt = 0;
      lastScrollTrackAt = 0;
      setInteractionTrackingEnabled(true);
    }

    function downloadEventLog() {
      trackEvent("event_log_downloaded", {
        eventCount: eventLog.length
      });

      const events = eventLog.slice();
      const payload = {
        schemaVersion: 1,
        sessionId: trackingSessionId,
        startedAt: trackingStartedAt,
        downloadedAt: new Date().toISOString(),
        eventCount: events.length,
        trackingConfig: {
          maxEvents: trackingConfig.maxEvents,
          mousemoveThrottleMs: trackingConfig.mousemoveThrottleMs,
          scrollThrottleMs: trackingConfig.scrollThrottleMs
        },
        page: {
          path: window.location.pathname,
          title: document.title
        },
        events
      };
      const logBlob = new Blob([JSON.stringify(payload, null, 2)], {
        type: "application/json"
      });
      const downloadUrl = URL.createObjectURL(logBlob);
      triggerDownload(downloadUrl, `tracking_data_${buildRecordingTimestamp()}.json`);
      window.setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);
    }

    function setupInteractionTracking() {
      document.addEventListener("click", (event) => {
        trackEvent("click", {
          x: event.clientX,
          y: event.clientY,
          pageX: event.clientX + window.scrollX,
          pageY: event.clientY + window.scrollY,
          scrollX: window.scrollX,
          scrollY: window.scrollY,
          button: event.button,
          target: getElementDescriptor(event.target)
        });
      }, true);

      document.addEventListener("mousemove", (event) => {
        const now = performance.now();
        if (now - lastMousemoveTrackAt < trackingConfig.mousemoveThrottleMs) {
          return;
        }
        lastMousemoveTrackAt = now;
        trackEvent("mousemove", {
          x: event.clientX,
          y: event.clientY,
          pageX: event.clientX + window.scrollX,
          pageY: event.clientY + window.scrollY,
          scrollX: window.scrollX,
          scrollY: window.scrollY,
          movementX: event.movementX,
          movementY: event.movementY,
          documentWidth: document.documentElement.scrollWidth,
          documentHeight: document.documentElement.scrollHeight,
          target: getElementDescriptor(event.target)
        });
      }, { passive: true });

      window.addEventListener("scroll", () => {
        const now = performance.now();
        if (now - lastScrollTrackAt < trackingConfig.scrollThrottleMs) {
          return;
        }
        lastScrollTrackAt = now;
        trackEvent("scroll", {
          scrollX: window.scrollX,
          scrollY: window.scrollY,
          documentWidth: document.documentElement.scrollWidth,
          documentHeight: document.documentElement.scrollHeight
        });
      }, { passive: true });

      document.addEventListener("keydown", (event) => {
        trackEvent("keydown", {
          key: getSafeKey(event),
          code: event.code,
          repeat: event.repeat,
          altKey: event.altKey,
          ctrlKey: event.ctrlKey,
          metaKey: event.metaKey,
          shiftKey: event.shiftKey,
          target: getElementDescriptor(event.target)
        });
      }, true);

      document.addEventListener("submit", (event) => {
        trackEvent("form_submit", {
          target: getElementDescriptor(event.target),
          method: event.target.method || "get",
          actionPath: event.target.action ? new URL(event.target.action, window.location.href).pathname : ""
        });
      }, true);

      document.addEventListener("visibilitychange", () => {
        trackEvent("page_visibility_change", {
          visibilityState: document.visibilityState
        });
      });
    }

    window.interactionTracker = {
      trackEvent,
      downloadEventLog,
      getEvents: () => eventLog.slice(),
      getSessionId: () => trackingSessionId,
      isEnabled: () => interactionTrackingEnabled,
      beginSession: beginInteractionTrackingSession,
      setEnabled: setInteractionTrackingEnabled
    };

    function buildStaticFileUrl(fileName) {
      return new URL(fileName, window.location.href).href;
    }

    function getMicrophoneConstraints() {
      return {
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          channelCount: { ideal: 2 },
          sampleRate: { ideal: targetWavSampleRate },
          sampleSize: { ideal: 24 }
        },
        video: false
      };
    }

    function buildMicrophoneOnlyStream(sourceStream) {
      const microphoneTracks = sourceStream
        .getAudioTracks()
        .filter((track) => track.readyState === "live" && track.enabled);

      if (!microphoneTracks.length) {
        throw new Error("No live microphone track");
      }

      return new MediaStream(microphoneTracks);
    }

    function hasActiveMicrophoneStream() {
      if (!micStream) {
        return false;
      }

      return micStream.getAudioTracks().some((track) => track.readyState === "live");
    }

    function stopMicrophoneStream() {
      if (!micStream) {
        return;
      }

      micStream.getTracks().forEach((track) => track.stop());
      micStream = null;
    }

    function revokeReceivedAudioObjectUrl() {
      if (!receivedAudioObjectUrl) {
        return;
      }

      URL.revokeObjectURL(receivedAudioObjectUrl);
      receivedAudioObjectUrl = "";
    }

    function setSensingControls(fileReady, sensingActive) {
      filePrompt.classList.toggle("hidden", !fileReady && !sensingActive);
      startSensingBtn.disabled = !fileReady || sensingActive;
      stopSensingBtn.disabled = !sensingActive;
    }

    function buildRecordingTimestamp() {
      const now = new Date();
      return [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join("") + "_" + [
        String(now.getHours()).padStart(2, "0"),
        String(now.getMinutes()).padStart(2, "0"),
        String(now.getSeconds()).padStart(2, "0")
      ].join("");
    }

    function buildRecordingFileName() {
      return `recording_${buildRecordingTimestamp()}.wav`;
    }

    function buildSpectrogramFileName() {
      return `recording_spectrogram_${buildRecordingTimestamp()}.png`;
    }

    function triggerDownload(downloadUrl, fileName) {
      const downloadLink = document.createElement("a");
      downloadLink.href = downloadUrl;
      downloadLink.download = fileName;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      downloadLink.remove();
    }

    function showSpectrogramStatus(message) {
      spectrogramStatus.textContent = message;
      spectrogramPanel.classList.remove("hidden");
    }

    function clearSpectrogram() {
      const ctx = spectrogramCanvas.getContext("2d");
      ctx.clearRect(0, 0, spectrogramCanvas.width, spectrogramCanvas.height);
      spectrogramPanel.classList.add("hidden");
      spectrogramStatus.textContent = "";
    }

    function toMonoChannel(audioBuffer) {
      const channelCount = audioBuffer.numberOfChannels;
      const length = audioBuffer.length;
      if (channelCount === 1) {
        return audioBuffer.getChannelData(0);
      }

      const mono = new Float32Array(length);
      for (let channelIndex = 0; channelIndex < channelCount; channelIndex += 1) {
        const channelData = audioBuffer.getChannelData(channelIndex);
        for (let sampleIndex = 0; sampleIndex < length; sampleIndex += 1) {
          mono[sampleIndex] += channelData[sampleIndex];
        }
      }

      for (let sampleIndex = 0; sampleIndex < length; sampleIndex += 1) {
        mono[sampleIndex] /= channelCount;
      }

      return mono;
    }

    function clampPcmSample(sample) {
      return Math.max(-1, Math.min(1, sample));
    }

    function getRecordingContext() {
      if (!audioContext) {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextCtor({ sampleRate: targetWavSampleRate });
      }
      return audioContext;
    }

    function resetRecordingBuffers() {
      recordingBufferChunks = [];
      recordingChannelCount = 0;
      recordedFrameCount = 0;
      recordingSessionActive = false;
    }

    function stopRecordingNodes() {
      if (recordingSourceNode) {
        recordingSourceNode.disconnect();
        recordingSourceNode = null;
      }
      if (recordingProcessorNode) {
        recordingProcessorNode.disconnect();
        recordingProcessorNode.onaudioprocess = null;
        recordingProcessorNode = null;
      }
      recordingSessionActive = false;
    }

    function buildAudioBufferFromRecording(context) {
      if (!recordedFrameCount || !recordingChannelCount) {
        return null;
      }

      const audioBuffer = context.createBuffer(
        recordingChannelCount,
        recordedFrameCount,
        context.sampleRate
      );
      const channelData = [];
      let frameOffset = 0;

      for (let channelIndex = 0; channelIndex < recordingChannelCount; channelIndex += 1) {
        channelData.push(audioBuffer.getChannelData(channelIndex));
      }

      for (const chunk of recordingBufferChunks) {
        for (let channelIndex = 0; channelIndex < recordingChannelCount; channelIndex += 1) {
          channelData[channelIndex].set(chunk[channelIndex], frameOffset);
        }
        frameOffset += chunk[0].length;
      }

      return audioBuffer;
    }

    function encodeAudioBufferToWav(audioBuffer) {
      const channelCount = audioBuffer.numberOfChannels;
      const sampleRate = audioBuffer.sampleRate;
      const frameCount = audioBuffer.length;
      const bytesPerSample = 2;
      const blockAlign = channelCount * bytesPerSample;
      const byteRate = sampleRate * blockAlign;
      const dataSize = frameCount * blockAlign;
      const wavBuffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(wavBuffer);
      const channelData = [];
      let offset = 0;

      for (let channelIndex = 0; channelIndex < channelCount; channelIndex += 1) {
        channelData.push(audioBuffer.getChannelData(channelIndex));
      }

      function writeAscii(text) {
        for (let index = 0; index < text.length; index += 1) {
          view.setUint8(offset, text.charCodeAt(index));
          offset += 1;
        }
      }

      writeAscii("RIFF");
      view.setUint32(offset, 36 + dataSize, true);
      offset += 4;
      writeAscii("WAVE");
      writeAscii("fmt ");
      view.setUint32(offset, 16, true);
      offset += 4;
      view.setUint16(offset, 1, true);
      offset += 2;
      view.setUint16(offset, channelCount, true);
      offset += 2;
      view.setUint32(offset, sampleRate, true);
      offset += 4;
      view.setUint32(offset, byteRate, true);
      offset += 4;
      view.setUint16(offset, blockAlign, true);
      offset += 2;
      view.setUint16(offset, bytesPerSample * 8, true);
      offset += 2;
      writeAscii("data");
      view.setUint32(offset, dataSize, true);
      offset += 4;

      for (let frameIndex = 0; frameIndex < frameCount; frameIndex += 1) {
        for (let channelIndex = 0; channelIndex < channelCount; channelIndex += 1) {
          const sample = clampPcmSample(channelData[channelIndex][frameIndex]);
          const pcmValue = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
          view.setInt16(offset, Math.round(pcmValue), true);
          offset += bytesPerSample;
        }
      }

      return new Blob([wavBuffer], { type: "audio/wav" });
    }

    function createHannWindow(size) {
      const windowValues = new Float32Array(size);
      for (let index = 0; index < size; index += 1) {
        windowValues[index] = 0.5 * (1 - Math.cos((2 * Math.PI * index) / (size - 1)));
      }
      return windowValues;
    }

    function getSpectrogramColor(value) {
      const clamped = Math.max(0, Math.min(1, value));
      const red = Math.round(255 * Math.pow(clamped, 0.72));
      const green = Math.round(255 * Math.pow(clamped, 1.55));
      const blue = Math.round(40 + 180 * (1 - clamped) * Math.pow(clamped, 0.35));
      return [red, green, blue];
    }

    function drawSpectrogramAxes(ctx, plotArea, audioBuffer) {
      const duration = audioBuffer.duration;
      const sampleRate = audioBuffer.sampleRate;
      const maxFrequency = sampleRate / 2;
      const frequencyTicks = 5;
      const timeTicks = Math.max(2, Math.min(6, Math.round(duration)));

      ctx.save();
      ctx.strokeStyle = "rgba(255, 248, 240, 0.28)";
      ctx.fillStyle = "rgba(255, 248, 240, 0.92)";
      ctx.lineWidth = 1;
      ctx.font = "12px 'Segoe UI', sans-serif";

      ctx.beginPath();
      ctx.moveTo(plotArea.left, plotArea.top);
      ctx.lineTo(plotArea.left, plotArea.bottom);
      ctx.lineTo(plotArea.right, plotArea.bottom);
      ctx.stroke();

      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let index = 0; index < frequencyTicks; index += 1) {
        const ratio = index / (frequencyTicks - 1);
        const y = plotArea.bottom - ratio * plotArea.height;
        const frequency = (ratio * maxFrequency) / 1000;
        ctx.beginPath();
        ctx.moveTo(plotArea.left - 6, y);
        ctx.lineTo(plotArea.left, y);
        ctx.stroke();
        ctx.fillText(`${frequency.toFixed(frequency >= 10 ? 0 : 1)} kHz`, plotArea.left - 10, y);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (let index = 0; index <= timeTicks; index += 1) {
        const ratio = index / timeTicks;
        const x = plotArea.left + ratio * plotArea.width;
        const seconds = ratio * duration;
        ctx.beginPath();
        ctx.moveTo(x, plotArea.bottom);
        ctx.lineTo(x, plotArea.bottom + 6);
        ctx.stroke();
        ctx.fillText(`${seconds.toFixed(duration >= 10 ? 0 : 1)} s`, x, plotArea.bottom + 10);
      }

      ctx.restore();
    }

    async function renderSpectrogram(recordedBlob) {
      showSpectrogramStatus("Generating spectrogram...");

      try {
        const arrayBuffer = await recordedBlob.arrayBuffer();
        const decodingContext = getRecordingContext();
        const audioBuffer = await decodingContext.decodeAudioData(arrayBuffer.slice(0));
        const samples = toMonoChannel(audioBuffer);
        if (samples.length < 8) {
          throw new Error("Recording too short");
        }
        const canvasWidth = spectrogramCanvas.width;
        const canvasHeight = spectrogramCanvas.height;
        const margin = { top: 16, right: 14, bottom: 54, left: 70 };
        const plotWidth = canvasWidth - margin.left - margin.right;
        const plotHeight = canvasHeight - margin.top - margin.bottom;
        const plotArea = {
          left: margin.left,
          top: margin.top,
          right: margin.left + plotWidth,
          bottom: margin.top + plotHeight,
          width: plotWidth,
          height: plotHeight
        };
        const fftSize = 512;
        const nyquistBins = fftSize / 2;
        const hopSize = Math.max(1, Math.floor(Math.max(1, samples.length - fftSize) / plotWidth));
        const windowValues = createHannWindow(fftSize);
        const ctx = spectrogramCanvas.getContext("2d");
        const imageData = ctx.createImageData(plotWidth, plotHeight);
        const pixelBuffer = imageData.data;

        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        ctx.fillStyle = "#0c0820";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        for (let x = 0; x < plotWidth; x += 1) {
          const start = Math.max(0, Math.min(samples.length - fftSize, x * hopSize));

          for (let y = 0; y < plotHeight; y += 1) {
            const normalizedY = y / Math.max(1, plotHeight - 1);
            const frequencyBin = Math.min(
              nyquistBins - 1,
              Math.floor(Math.pow(normalizedY, 1.85) * (nyquistBins - 1))
            );

            let real = 0;
            let imaginary = 0;
            for (let n = 0; n < fftSize; n += 1) {
              const sample = samples[start + n] * windowValues[n];
              const angle = (2 * Math.PI * frequencyBin * n) / fftSize;
              real += sample * Math.cos(angle);
              imaginary -= sample * Math.sin(angle);
            }

            const magnitude = Math.sqrt(real * real + imaginary * imaginary) / fftSize;
            const db = 20 * Math.log10(magnitude + 1e-6);
            const normalizedMagnitude = Math.max(0, Math.min(1, (db + 90) / 70));
            const [red, green, blue] = getSpectrogramColor(normalizedMagnitude);
            const pixelIndex = ((plotHeight - 1 - y) * plotWidth + x) * 4;
            pixelBuffer[pixelIndex] = red;
            pixelBuffer[pixelIndex + 1] = green;
            pixelBuffer[pixelIndex + 2] = blue;
            pixelBuffer[pixelIndex + 3] = 255;
          }
        }

        ctx.putImageData(imageData, plotArea.left, plotArea.top);
        drawSpectrogramAxes(ctx, plotArea, audioBuffer);
        showSpectrogramStatus("Spectrogram of the recorded audio.");
      } catch (error) {
        showSpectrogramStatus("Could not generate a spectrogram for the recording.");
      }
    }

    async function downloadRecordedAudio(recordedAudioBuffer) {
      if (!recordedAudioBuffer) {
        fileStatus.textContent = "Sensing stopped, but no microphone recording was captured.";
        return;
      }

      try {
        const wavBlob = encodeAudioBufferToWav(recordedAudioBuffer);
        await renderSpectrogram(wavBlob);
        const fileName = buildRecordingFileName();
        const downloadUrl = URL.createObjectURL(wavBlob);
        triggerDownload(downloadUrl, fileName);
        window.setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);

        const spectrogramUrl = spectrogramCanvas.toDataURL("image/png");
        const spectrogramFileName = buildSpectrogramFileName();
        triggerDownload(spectrogramUrl, spectrogramFileName);

        fileStatus.textContent = `Sensing stopped. Recording downloaded as ${fileName} at ${recordedAudioBuffer.sampleRate} Hz, spectrogram downloaded as ${spectrogramFileName}.`;
      } catch (error) {
        fileStatus.textContent = "Sensing stopped, but failed to download the recording or spectrogram.";
      } finally {
        resetRecordingBuffers();
      }
    }

    function clearPendingFile() {
      pendingFileUrl = "";
      pendingFileName = "";
      setSensingControls(false, false);
    }

    function cancelRecordingSession() {
      stopRecordingNodes();
      resetRecordingBuffers();
    }

    async function startSensing() {
      if (!pendingFileUrl || sensingSessionActive) {
        return;
      }

      startSensingBtn.disabled = true;
      stopSensingBtn.disabled = true;

      try {
        fileStatus.textContent = "Loading ultrasound chirp...";
        const response = await fetch(pendingFileUrl, { method: "GET" });
        if (!response.ok) {
          throw new Error("Audio fetch failed");
        }
        const audioBlob = await response.blob();
        if (!audioBlob.type.startsWith("audio/")) {
          throw new Error("Not an audio file");
        }

        revokeReceivedAudioObjectUrl();
        receivedAudioObjectUrl = URL.createObjectURL(audioBlob);
        receivedAudio.src = receivedAudioObjectUrl;
        receivedAudio.loop = true;
        receivedAudio.currentTime = 0;

        const recordingStarted = await prepareRecordingForPlayback();
        if (!recordingStarted) {
          throw new Error("Recording did not start");
        }

        await receivedAudio.play();
        sensingSessionActive = true;
        beginInteractionTrackingSession();
        setSensingControls(true, true);
        fileStatus.textContent = `Sensing started. Looping ${pendingFileName} while capturing raw microphone PCM.`;
      } catch (error) {
        sensingSessionActive = false;
        setInteractionTrackingEnabled(false);
        receivedAudio.pause();
        cancelRecordingSession();
        setSensingControls(Boolean(pendingFileUrl), false);
        fileStatus.textContent = "Could not start sensing.";
      }
    }

    async function stopSensing() {
      if (!sensingSessionActive && !recordingSessionActive && !recordedFrameCount) {
        return;
      }

      sensingSessionActive = false;
      downloadEventLog();
      setInteractionTrackingEnabled(false);
      startSensingBtn.disabled = true;
      stopSensingBtn.disabled = true;
      receivedAudio.pause();
      receivedAudio.currentTime = 0;
      fileStatus.textContent = "Sensing stopped. Preparing recording download...";

      await stopRecordingSession();
      setSensingControls(Boolean(pendingFileUrl), false);
    }

    async function requestFileFromServer() {
      fileStatus.textContent = "Preparing file...";
      clearPendingFile();
      clearSpectrogram();

      try {
        const fileUrl = buildStaticFileUrl(appConfig.downloadFileName);
        const response = await fetch(fileUrl, { method: "HEAD" });
        if (!response.ok) {
          throw new Error("File not found");
        }

        pendingFileUrl = fileUrl;
        pendingFileName = appConfig.downloadFileName;
        fileStatus.textContent = `Ultrasound chirp ready: ${pendingFileName}.`;
        setSensingControls(true, false);
      } catch (error) {
        clearPendingFile();
        fileStatus.textContent = "Failed to find file on this site.";
      }
    }

    async function requestMicrophone() {
      const microphoneReady = await ensureMicrophoneReady();
      if (!microphoneReady) {
        fileStatus.textContent = "File request skipped.";
        return;
      }

      await requestFileFromServer();
    }

    async function ensureMicrophoneReady() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        micStatus.textContent = "Microphone is not supported in this browser.";
        return false;
      }

      if (hasActiveMicrophoneStream()) {
        micStatus.textContent = "Microphone is on.";
        return true;
      }

      try {
        micStream = await navigator.mediaDevices.getUserMedia(getMicrophoneConstraints());
        if (micStream) {
          micStatus.textContent = "Microphone is on.";
          return true;
        }
      } catch (error) {
        micStatus.textContent = "Could not turn on microphone. Please allow microphone permission.";
        return false;
      }

      return false;
    }

    async function stopRecordingSession() {
      const shouldFinalizeRecording = recordingSessionActive || recordedFrameCount > 0;
      const completedRecording = shouldFinalizeRecording
        ? buildAudioBufferFromRecording(getRecordingContext())
        : null;
      stopRecordingNodes();
      resetRecordingBuffers();
      if (completedRecording) {
        await downloadRecordedAudio(completedRecording);
        return true;
      } else {
        fileStatus.textContent = "Sensing stopped, but no microphone recording was captured.";
        return false;
      }
    }

    async function startRecordingSession() {
      if (!micStream) {
        return false;
      }
      if (!window.AudioContext && !window.webkitAudioContext) {
        fileStatus.textContent = "Sensing started, but raw microphone capture is not supported in this browser.";
        return false;
      }

      try {
        const recordingContext = getRecordingContext();
        if (recordingContext.state === "suspended") {
          await recordingContext.resume();
        }

        const microphoneOnlyStream = buildMicrophoneOnlyStream(micStream);
        const processorChannelCount = Math.max(
          1,
          Math.min(
            2,
            microphoneOnlyStream.getAudioTracks()[0].getSettings().channelCount || 1
          )
        );

        stopRecordingNodes();
        resetRecordingBuffers();
        clearSpectrogram();

        recordingSourceNode = recordingContext.createMediaStreamSource(microphoneOnlyStream);
        recordingProcessorNode = recordingContext.createScriptProcessor(4096, processorChannelCount, processorChannelCount);
        recordingProcessorNode.onaudioprocess = (event) => {
          const inputBuffer = event.inputBuffer;

          if (!recordingChannelCount) {
            recordingChannelCount = inputBuffer.numberOfChannels;
          }

          const chunk = [];
          for (let channelIndex = 0; channelIndex < recordingChannelCount; channelIndex += 1) {
            chunk.push(new Float32Array(inputBuffer.getChannelData(channelIndex)));
          }
          recordingBufferChunks.push(chunk);
          recordedFrameCount += inputBuffer.length;
        };

        recordingSourceNode.connect(recordingProcessorNode);
        recordingProcessorNode.connect(recordingContext.destination);
        recordingSessionActive = true;

        fileStatus.textContent = "Starting sensing while capturing raw microphone PCM only.";
        return true;
      } catch (error) {
        stopRecordingNodes();
        resetRecordingBuffers();
        fileStatus.textContent = "Sensing could not start because raw microphone capture could not start.";
        return false;
      }
    }

    async function prepareRecordingForPlayback() {
      if (recordingSessionActive || playbackStartInProgress) {
        return recordingSessionActive;
      }

      playbackStartInProgress = true;
      try {
        const microphoneReady = await ensureMicrophoneReady();
        if (!microphoneReady) {
          fileStatus.textContent = "Sensing could not start because microphone recording could not start.";
          return false;
        }

        return await startRecordingSession();
      } finally {
        playbackStartInProgress = false;
      }
    }

    startSensingBtn.addEventListener("click", async () => {
      await startSensing();
    });

    stopSensingBtn.addEventListener("click", async () => {
      await stopSensing();
    });

    receivedAudio.addEventListener("ended", () => {
      void stopSensing();
    });

    receivedAudio.addEventListener("error", () => {
      sensingSessionActive = false;
      setInteractionTrackingEnabled(false);
      setSensingControls(Boolean(pendingFileUrl), false);
      void stopRecordingSession();
    });

    window.addEventListener("pagehide", () => {
      setInteractionTrackingEnabled(false);
      receivedAudio.pause();
      stopRecordingNodes();
      resetRecordingBuffers();
      stopMicrophoneStream();
      revokeReceivedAudioObjectUrl();
    });

    setupInteractionTracking();
    void requestMicrophone();
  </script>
</body>
</html>
